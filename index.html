<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sokaklarda 1 Kuş</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b0c10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #fff;
        }
        #gameWrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        .panel {
            background: rgba(20, 20, 25, 0.96);
            border: 2px solid #ff1a1a;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0px 0px 20px rgba(255, 26, 26, 0.4);
            text-align: center;
            z-index: 100;
            position: absolute;
        }
        .logo-container {
            width: 100%;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .logo-img {
            width: 100%;
            max-height: 60px;
            object-fit: contain;
        }
        .panel h2 { 
            margin-top: 0; 
            margin-bottom: 15px;
            color: #fff; 
            font-size: 20px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        .panel input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #333;
            background: #151518;
            color: #fff;
            font-size: 14px;
        }
        .panel input:focus { border-color: #ff1a1a; outline: none; }
        .panel button {
            width: 100%;
            padding: 12px;
            background: #ff1a1a;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .panel button:hover { background: #cc0000; box-shadow: 0 0 10px rgba(255, 26, 26, 0.5); }
        .error-msg { color: #ff4a4a; font-size: 13px; margin: 5px 0; display: none; font-weight: 500; }
        .hidden { display: none !important; }
        
        canvas {
            background: linear-gradient(to bottom, #111324, #201a30);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0px 0px 30px rgba(0,0,0,0.8);
        }
        #devNotice {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 0, 0, 0.8);
            color: #fff;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            z-index: 1000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="gameWrapper">
    <div id="devNotice" class="hidden">DEV MODE: [H] Ölümsüzlük | [K] +10 Skor</div>

    <div id="authPanel" class="panel">
        <div class="logo-container">
            <img class="logo-img" src="https://raw.githubusercontent.com/mustikdev/streette1kus/main/image_bb7b42.png" alt="Street Roleplay Logo">
        </div>
        <h2 id="authTitle">Kayıt Ol</h2>
        <div class="error-msg" id="authError"></div>
        
        <input type="text" id="icName" placeholder="IC İsim - Soyisim">
        <input type="email" id="email" placeholder="E-Posta Adresi">
        <input type="password" id="password" placeholder="Şifreniz">
        <input type="password" id="passwordConfirm" placeholder="Şifre Tekrarı">
        
        <button id="authBtn" onclick="window.handleAuth()">Kayıt İşlemini Tamamla</button>
        <p id="toggleAuthText" style="font-size: 13px; cursor: pointer; color: #aaa; margin-top: 15px;" onclick="window.toggleAuthMode()">Zaten hesabınız var mı? Giriş Yapın</p>
    </div>

    <canvas id="gameCanvas" class="hidden"></canvas>
</div>

<script>
(function() {
    //
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1509503712148848752/suQqOT7wZy7KDCwC1vXmT-8ByoTaXSPpQWSe6NcVUETNbuJhyKG2nnOmkcGyrwO20JH0"; 

    let isLoginMode = false;
    let currentUser = null;
    let isDevMode = false;
    let godMode = false;
    let reportSent = false; // Her oyunda sadece 1 kez bildirim gitmesi için
    
    const deviceId = btoa(navigator.userAgent + screen.width + screen.height);

    window.toggleAuthMode = function() {
        isLoginMode = !isLoginMode;
        document.getElementById("authTitle").innerText = isLoginMode ? "Giriş Yap" : "Kayıt Ol";
        document.getElementById("authBtn").innerText = isLoginMode ? "Giriş Yap" : "Kayıt İşlemini Tamamla";
        document.getElementById("toggleAuthText").innerText = isLoginMode ? "Hesabınız yok mu? Kayıt Olun" : "Zaten hesabınız var mı? Giriş Yapın";
        
        document.getElementById("icName").classList.toggle("hidden", isLoginMode);
        document.getElementById("passwordConfirm").classList.toggle("hidden", isLoginMode);
        document.getElementById("authError").style.display = "none";
    };

    window.handleAuth = function() {
        const icName = document.getElementById("icName").value.trim();
        const email = document.getElementById("email").value.trim().toLowerCase();
        const password = document.getElementById("password").value;
        const passwordConfirm = document.getElementById("passwordConfirm").value;
        const errorDiv = document.getElementById("authError");
        
        let db = JSON.parse(localStorage.getItem("sr_game_users")) || [];

        if (!email || !password) {
            errorDiv.innerText = "E-posta ve şifre boş bırakılamaz!";
            errorDiv.style.display = "block";
            return;
        }

        if (!isLoginMode) {
            if (!icName) {
                errorDiv.innerText = "IC İsim - Soyisim boş bırakılamaz!";
                errorDiv.style.display = "block";
                return;
            }
            if (password !== passwordConfirm) {
                errorDiv.innerText = "Şifreler birbiriyle uyuşmuyor!";
                errorDiv.style.display = "block";
                return;
            }
            
            const nameExists = db.some(u => u.icName === icName);
            if (nameExists) {
                errorDiv.innerText = "Bu İsim-Soyisim zaten kayıtlı!";
                errorDiv.style.display = "block";
                return;
            }

            db.push({
                icName: icName,
                email: email,
                password: password,
                registeredDevice: deviceId
            });
            localStorage.setItem("sr_game_users", JSON.stringify(db));
            
            alert("Kayıt başarılı! Giriş ekranına yönlendiriliyorsunuz.");
            window.toggleAuthMode();
        } else {
            const user = db.find(u => u.email === email && u.password === password);
            if (!user) {
                errorDiv.innerText = "Hatalı E-posta veya şifre!";
                errorDiv.style.display = "block";
                return;
            }

            if (user.registeredDevice !== deviceId) {
                errorDiv.innerText = "HATA: Bu hesaba sadece kayıt olunan bilgisayardan girilebilir!";
                errorDiv.style.display = "block";
                return;
            }

            currentUser = user;
            
            // GELİŞTİRİCİ KONTROLÜ (Kayıtlı ismi 'developer' ise hileler açılır)
            if (user.icName.toLowerCase() === "developer") {
                isDevMode = true;
                document.getElementById("devNotice").classList.remove("hidden");
            }

            document.getElementById("authPanel").classList.add("hidden");
            canvas.classList.remove("hidden");
            
            resizeCanvas();
            resetGame();
            loop();
        }
    };

    // --- CANVAS MOTORU ---
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let birdY, velocity, score, gameOver, pipes, frameCount;
    
    const gravity = 0.15;
    const jump = -4.2;
    const pipeSpeed = 1.5;
    const pipeGap = 170; 
    const pipeWidth = 80;

    let backBuildings = [];

    function resizeCanvas() {
        let width = window.innerWidth;
        let height = window.innerHeight;
        
        if (width > 450) width = 450;
        if (height > 700) height = 700;
        
        canvas.width = width;
        canvas.height = height;

        backBuildings = [];
        for(let i = 0; i < 6; i++) {
            backBuildings.push({ x: i * 90, width: 65, height: 100 + Math.random() * (canvas.height / 3) });
        }
    }
    window.addEventListener("resize", () => { if(currentUser && !gameOver) resizeCanvas(); });

    function resetGame() {
        birdY = canvas.height / 2;
        velocity = 0;
        score = 0;
        gameOver = false;
        frameCount = 0;
        pipes = [];
        reportSent = false;
        createPipe();
    }

    function createPipe() {
        let minH = 60;
        let maxH = canvas.height - pipeGap - 80;
        let height = Math.floor(Math.random() * (maxH - minH + 1)) + minH;
        pipes.push({ x: canvas.width, top: height, passed: false });
    }

    // BİLDİRİM GÖNDERME FONKSİYONU
    function sendScoreNotification(userObj, finalScore) {
        if (!WEBHOOK_URL) return; // Link eklenmediyse çalışmaz
        
        const payload = {
            content: `🚨 **Sokaklarda 1 Kuş - Yeni Rekor!**\n👤 **Kullanıcı:** ${userObj.icName}\n📧 **E-Posta:** ${userObj.email}\n🏆 **Yapılan Skor:** ${finalScore}\n💻 **Cihaz ID:** \`${userObj.registeredDevice.substring(0,15)}...\``
        };

        fetch(WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).catch(err => console.log("Bildirim gönderilemedi."));
    }

    document.addEventListener("keydown", (e) => {
        if (currentUser && !canvas.classList.contains("hidden")) {
            if (e.code === "Space") {
                e.preventDefault();
                if (gameOver) resetGame();
                else velocity = jump;
            }
            
            // Geliştirici Tuş Kombinasyonları
            if (isDevMode) {
                if (e.key === "h" || e.key === "H") {
                    godMode = !godMode;
                    document.getElementById("devNotice").innerText = "DEV MODE: " + (godMode ? "ÖLÜMSÜZ" : "NORMAL");
                }
                if (e.key === "k" || e.key === "K") {
                    score += 10;
                }
            }
        }
    });

    canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        if (gameOver) resetGame();
        else velocity = jump;
    }, {passive: false});

    canvas.addEventListener("click", () => {
        if (currentUser && !canvas.classList.contains("hidden")) {
            if (gameOver) resetGame();
            else velocity = jump;
        }
    });

    function update() {
        frameCount++;
        backBuildings.forEach(b => {
            b.x -= 0.2;
            if(b.x + b.width < 0) b.x = canvas.width;
        });

        if (!gameOver) {
            velocity += gravity;
            birdY += velocity;

            if (!godMode && (birdY + 12 >= canvas.height || birdY - 12 <= 0)) gameOver = true;

            if (frameCount % 150 === 0) createPipe();

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;

                let birdX = 50; 
                if (!godMode && (birdX + 12 > pipes[i].x && birdX - 12 < pipes[i].x + pipeWidth)) {
                    if (birdY - 10 < pipes[i].top || birdY + 10 > pipes[i].top + pipeGap) {
                        gameOver = true;
                    }
                }

                if (!pipes[i].passed && pipes[i].x + pipeWidth < birdX) {
                    score++;
                    pipes[i].passed = true;
                }

                if (pipes[i].x + pipeWidth < 0) pipes.splice(i, 1);
            }
            
            // Oyuncu 100 skora ulaştığı veya geçtiği an tetiklenir
            if (score >= 100 && !reportSent && !godMode) {
                reportSent = true;
                sendScoreNotification(currentUser, score);
            }
        } else {
            // Oyun bittiğinde 100 üstü yaptıysa son skoru iletmek için ekstra garanti
            if (score >= 100 && !reportSent && !godMode) {
                reportSent = true;
                sendScoreNotification(currentUser, score);
            }
        }
    }

    const logoElement = new Image();
    logoElement.src = "https://raw.githubusercontent.com/mustikdev/streette1kus/main/image_bb7b42.png";

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        bgGrad.addColorStop(0, "#090a10");
        bgGrad.addColorStop(1, "#151624");
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#0f1019";
        backBuildings.forEach(b => {
            ctx.fillRect(b.x, canvas.height - b.height, b.width, b.height);
        });

        pipes.forEach(p => {
            let wallGrad = ctx.createLinearGradient(p.x, 0, p.x + pipeWidth, 0);
            wallGrad.addColorStop(0, "#3a2828");
            wallGrad.addColorStop(0.5, "#523737");
            wallGrad.addColorStop(1, "#2b1e1e");
            ctx.fillStyle = wallGrad;
            
            ctx.fillRect(p.x, 0, pipeWidth, p.top);
            ctx.fillRect(p.x, p.top + pipeGap, pipeWidth, canvas.height - (p.top + pipeGap));

            ctx.fillStyle = "#1e1515";
            ctx.fillRect(p.x - 2, p.top - 12, pipeWidth + 4, 12);
            ctx.fillRect(p.x - 2, p.top + pipeGap, pipeWidth + 4, 12);
            
            ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
            for(let y = 20; y < p.top - 20; y += 35) {
                ctx.fillRect(p.x + 15, y, 15, 15);
                ctx.fillRect(p.x + 50, y, 15, 15);
            }
            for(let y = p.top + pipeGap + 25; y < canvas.height - 20; y += 35) {
                ctx.fillRect(p.x + 15, y, 15, 15);
                ctx.fillRect(p.x + 50, y, 15, 15);
            }
        });

        ctx.save();
        ctx.translate(50, birdY);
        
        ctx.beginPath();
        ctx.arc(0, 0, 13, 0, Math.PI * 2);
        let birdGrad = ctx.createRadialGradient(-2, -2, 2, 0, 0, 13);
        birdGrad.addColorStop(0, "#d1d8e0");
        birdGrad.addColorStop(1, "#778ca3");
        ctx.fillStyle = godMode ? "#00ff00" : birdGrad;
        ctx.fill();
        ctx.strokeStyle = "#4b6584";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.beginPath();
        ctx.ellipse(-3, 2, 7, 4, Math.PI / 6, 0, Math.PI * 2);
        ctx.fillStyle = "#4b6584";
        ctx.fill();

        ctx.beginPath(); ctx.arc(4, -3, 2, 0, Math.PI * 2); ctx.fillStyle = "#000"; ctx.fill();

        ctx.fillStyle = "#fa8231";
        ctx.beginPath(); ctx.moveTo(11, -2); ctx.lineTo(17, -3); ctx.lineTo(12, 2); ctx.fill();

        ctx.restore();

        ctx.fillStyle = "#fff";
        ctx.font = "bold 16px Arial";
        ctx.fillText(`SKOR: ${score}`, 15, 30);

        if (gameOver) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            try {
                let logoW = 240;
                let logoH = (logoW * logoElement.height) / logoElement.width;
                ctx.drawImage(logoElement, canvas.width / 2 - logoW / 2, canvas.height / 4, logoW, logoH);
            } catch(e){}

            ctx.textAlign = "center";
            ctx.fillStyle = "#ff1a1a";
            ctx.font = "bold 28px Arial";
            ctx.fillText("OYUN BİTTİ", canvas.width / 2, canvas.height / 2 + 65);
            ctx.font = "16px Arial";
            ctx.fillStyle = "#fff";
            ctx.fillText(`Skorun: ${score}`, canvas.width / 2, canvas.height / 2 + 95);
            ctx.font = "13px Arial";
            ctx.fillStyle = "#aaa";
            ctx.fillText("Tekrar Uçmak İçin Tıkla veya Boşluk Tuşuna Bas", canvas.width / 2, canvas.height / 2 + 125);
            ctx.textAlign = "start";
        }
    }

    function loop() {
        update();
        draw();
        if (currentUser) requestAnimationFrame(loop);
    }

    // --- ANTI-CHEAT KORUMALARI ---
    document.addEventListener("keydown", function(e) {
        if (e.key === "F12" || e.keyCode === 123) {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.keyCode === 73 || e.keyCode === 74)) {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && (e.key === "u" || e.keyCode === 85)) {
            e.preventDefault();
            return false;
        }
    });
})();
</script>
</body>
</html>
