<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sokaklarda 1 Kuş</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b0c10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #fff;
        }
        #gameWrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        .panel {
            background: rgba(20, 20, 25, 0.96);
            border: 2px solid #ff1a1a;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0px 0px 20px rgba(255, 26, 26, 0.4);
            text-align: center;
            z-index: 100;
            position: absolute;
        }
        .logo-container {
            width: 100%;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .logo-img {
            width: 100%;
            max-height: 60px;
            object-fit: contain;
        }
        .panel h2 { 
            margin-top: 0; 
            margin-bottom: 15px;
            color: #fff; 
            font-size: 20px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        .panel input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #333;
            background: #151518;
            color: #fff;
            font-size: 14px;
        }
        .panel input:focus { border-color: #ff1a1a; outline: none; }
        .panel button {
            width: 100%;
            padding: 12px;
            background: #ff1a1a;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .panel button:hover { background: #cc0000; box-shadow: 0 0 10px rgba(255, 26, 26, 0.5); }
        .error-msg { color: #ff4a4a; font-size: 13px; margin: 5px 0; display: none; font-weight: 500; }
        .hidden { display: none !important; }
        
        canvas {
            background: linear-gradient(to bottom, #111324, #201a30);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0px 0px 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="gameWrapper">
    <div id="authPanel" class="panel">
        <div class="logo-container">
            <img class="logo-img" src="https://raw.githubusercontent.com/mustikdev/streette1kus/main/image_bb7b42.png" alt="Street Roleplay Logo">
        </div>
        <h2 id="authTitle">Kayıt Ol</h2>
        <div class="error-msg" id="authError"></div>
        
        <input type="text" id="icName" placeholder="IC İsim - Soyisim">
        <input type="email" id="email" placeholder="E-Posta Adresi">
        <input type="password" id="password" placeholder="Şifreniz">
        <input type="password" id="passwordConfirm" placeholder="Şifre Tekrarı">
        
        <button id="authBtn" onclick="toggleAuthMode ? window.handleAuth() : null">Kayıt İşlemini Tamamla</button>
        <p id="toggleAuthText" style="font-size: 13px; cursor: pointer; color: #aaa; margin-top: 15px;" onclick="window.toggleAuthMode()">Zaten hesabınız var mı? Giriş Yapın</p>
    </div>

    <div id="targetPanel" class="panel hidden">
        <div class="logo-container">
            <img class="logo-img" src="https://raw.githubusercontent.com/mustikdev/streette1kus/main/image_bb7b42.png" alt="Street Roleplay Logo">
        </div>
        <h2 style="color: #ff1a1a;">Hedef Skor</h2>
        <p style="font-size: 14px; color: #ccc; margin-bottom: 10px;">Sokaklarda hedefe ulaşmak için bir skor belirleyin:</p>
        <input type="number" id="targetScoreInput" value="10" min="1">
        <button onclick="window.startGame()">Oyunu Başlat</button>
    </div>

    <canvas id="gameCanvas" class="hidden"></canvas>
</div>

<script>
(function() {
    let isLoginMode = false;
    let currentUser = null;
    let targetScore = 10;
    
    const deviceId = btoa(navigator.userAgent + screen.width + screen.height);

    window.toggleAuthMode = function() {
        isLoginMode = !isLoginMode;
        document.getElementById("authTitle").innerText = isLoginMode ? "Giriş Yap" : "Kayıt Ol";
        document.getElementById("authBtn").innerText = isLoginMode ? "Giriş Yap" : "Kayıt İşlemini Tamamla";
        document.getElementById("toggleAuthText").innerText = isLoginMode ? "Hesabınız yok mu? Kayıt Olun" : "Zaten hesabınız var mı? Giriş Yapın";
        
        document.getElementById("icName").classList.toggle("hidden", isLoginMode);
        document.getElementById("passwordConfirm").classList.toggle("hidden", isLoginMode);
        document.getElementById("authError").style.display = "none";
    };

        const email = document.getElementById("email").value.trim().toLowerCase();
