<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sokaklarda 1 Kuş</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0c10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #fff;
        }
        .logo-container {
            width: 100%;
            max-width: 320px;
            margin: 0 auto 15px auto;
        }
        .logo-img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }
        .panel {
            background: rgba(20, 20, 25, 0.96);
            border: 2px solid #ff1a1a;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0px 0px 20px rgba(255, 26, 26, 0.4);
            text-align: center;
            z-index: 100;
            position: absolute;
        }
        .panel h2 { margin-top: 0; color: #fff; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .panel input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #333;
            background: #151518;
            color: #fff;
            font-size: 14px;
        }
        .panel input:focus { border-color: #ff1a1a; outline: none; }
        .panel button {
            width: 100%;
            padding: 12px;
            background: #ff1a1a;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .panel button:hover { background: #cc0000; box-shadow: 0 0 10px rgba(255, 26, 26, 0.5); }
        .error-msg { color: #ff4a4a; font-size: 13px; margin: 5px 0; display: none; font-weight: 500; }
        .hidden { display: none !important; }
        
        #gameWrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        canvas {
            background: linear-gradient(to bottom, #111324, #201a30);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0px 0px 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
