<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streette 1 Kus - Advanced</title>
    <style>
        body {
            margin: 0;
            background-color: #121214;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #fff;
        }
        .panel {
            background: rgba(30, 30, 35, 0.95);
            border: 2px solid #3e3e4a;
            border-radius: 12px;
            padding: 30px;
            width: 350px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
            text-align: center;
        }
        .panel h2 { margin-top: 0; color: #f67f25; }
        .panel input, .panel select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #555;
            background: #2a2a30;
            color: #fff;
            box-sizing: border-box;
        }
        .panel button {
            width: 100%;
            padding: 12px;
            background: #f67f25;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .panel button:hover { background: #d66813; }
        .error-msg { color: #ff4a4a; font-size: 14px; margin: 5px 0; display: none; }
        .hidden { display: none !important; }
        canvas {
            border: 4px solid #333;
            background: linear-gradient(to bottom, #1a1c2e, #0f101b);
            box-shadow: 0px 10px 30px rgba(0,0,0,0.8);
        }
        #devModeNotice {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,0,0,0.7);
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }
    </style>
</head>
<body>

<!-- 1. ADIM: KAYIT & GİRİŞ PANELİ -->
<div id="authPanel" class="panel">
    <h2 id="authTitle">Kayıt Ol</h2>
    <div class="error-msg" id="authError"></div>
    
    <input type="text" id="username" placeholder="Kullanıcı Adı (İsim-Soyisim)">
    <input type="email" id="email" placeholder="E-Posta Adresi">
    <input type="password" id="password" placeholder="Şifreniz">
    <input type="password" id="passwordConfirm" placeholder="Şifre Tekrarı">
    
    <button id="authBtn" onclick="handleAuth()">Kayıt İşlemini Tamamla</button>
    <p id="toggleAuthText" style="font-size: 13px; cursor: pointer; color: #aaa;" onclick="toggleAuthMode()">Zaten hesabınız var mı? Giriş Yapın</p>
</div>

<!-- 2. ADIM: HEDEF SKOR PANELİ -->
<div id="targetPanel" class="panel hidden">
    <h2>Hedef Skor Belirle</h2>
    <p>Oyunu bitirmek için ulaşmanız gereken hedef skoru yazın.</p>
    <input type="number" id="targetScoreInput" value="10" min="1">
    <button onclick="startGame()">Oyunu Başlat</button>
</div>

<!-- 3. ADIM: OYUN EKRANI -->
<div id="gameContainer" class="hidden" style="position: relative;">
    <div id="devModeNotice" class="hidden">DEVELOPER MODE: [H] Ölümsüzlük | [K] Skoru Uçur</div>
    <canvas id="gameCanvas" width="450" height="600"></canvas>
</div>

<script>
// --- SİSTEM VE GÜVENLİK DEĞİŞKENLERİ ---
let isLoginMode = false;
let currentUser = null;
let targetScore = 10;
let isDevMode = false;

// Cihazı ayırt etmek için basit bir Fingerprint simülasyonu (UserAgent + Ekran Çözünürlüğü)
const deviceId = btoa(navigator.userAgent + screen.width + screen.height);

function toggleAuthMode() {
    isLoginMode = !isLoginMode;
    document.getElementById("authTitle").innerText = isLoginMode ? "Giriş Yap" : "Kayıt Ol";
    document.getElementById("authBtn").innerText = isLoginMode ? "Giriş Yap" : "Kayıt İşlemini Tamamla";
    document.getElementById("toggleAuthText").innerText = isLoginMode ? "Hesabınız yok mu? Kayıt Olun" : "Zaten hesabınız var mı? Giriş Yapın";
    
    // Giriş modunda eposta ve şifre tekrarına gerek yok
    document.getElementById("email").classList.toggle("hidden", isLoginMode);
    document.getElementById("passwordConfirm").classList.toggle("hidden", isLoginMode);
    document.getElementById("authError").style.display = "none";
}

function handleAuth() {
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const passwordConfirm = document.getElementById("passwordConfirm").value;
    const errorDiv = document.getElementById("authError");
    
    let db = JSON.parse(localStorage.getItem("game_users")) || {};

    if (!username || !password) {
        errorDiv.innerText = "Kullanıcı adı ve şifre boş bırakılamaz!";
        errorDiv.style.display = "block";
        return;
    }

    if (!isLoginMode) {
        // --- KAYIT MODU ---
        if (password !== passwordConfirm) {
            errorDiv.innerText = "Şifreler birbiriyle uyuşmuyor!";
            errorDiv.style.display = "block";
            return;
        }
        if (db[username]) {
            errorDiv.innerText = "Bu kullanıcı adı zaten alınmış!";
            errorDiv.style.display = "block";
            return;
        }

        // Yeni kullanıcıyı kaydet (Cihaz Kimliğiyle Birlikte)
        db[username] = {
            username: username,
            email: email,
            password: password,
            registeredDevice: deviceId
        };
        localStorage.setItem("game_users", JSON.stringify(db));
        
        alert("Kayıt başarılı! Şimdi giriş yapabilirsiniz.");
        toggleAuthMode();
    } else {
        // --- GİRİŞ MODU ---
        const user = db[username];
        if (!user || user.password !== password) {
            errorDiv.innerText = "Hatalı kullanıcı adı veya şifre!";
            errorDiv.style.display = "block";
            return;
        }

        // Cihaz Kontrolü (Donanım/Tarayıcı Kilidi)
        if (user.registeredDevice !== deviceId) {
            errorDiv.innerText = "HATA: Bu hesaba sadece oluşturulduğu bilgisayardan/cihazdan erişilebilir!";
            errorDiv.style.display = "block";
            return;
        }

        // Giriş Başarılı
        currentUser = user;
        
        // Developer Kontrolü (Kullanıcı adın mustikdev ise hileler açılır)
        if (username.toLowerCase() === "mustikdev") {
            isDevMode = true;
            document.getElementById("devModeNotice").classList.remove("hidden");
        }

        document.getElementById("authPanel").classList.add("hidden");
        document.getElementById("targetPanel").classList.remove("hidden");
    }
}

function startGame() {
    targetScore = parseInt(document.getElementById("targetScoreInput").value) || 10;
    document.getElementById("targetPanel").classList.add("hidden");
    document.getElementById("gameContainer").classList.remove("remove", "hidden");
    resetGame();
    loop();
}

// --- OYUN MOTORU VE GRAFİKLER (GERÇEKÇİ SOKAK TEMASI) ---
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let birdY, velocity, score, gameOver, pipes, frameCount;
let gravity = 0.22;
let jump = -5.2;
let godMode = false; // Developer hilesi

// Arka plan binaları (Gerçekçilik hissi için derinlik efekti)
let backBuildings = [];
for(let i=0; i<5; i++) {
    backBuildings.push({ x: i * 120, width: 80, height: 150 + Math.random()*150 });
}

let pipeWidth = 70;
let pipeGap = 150;
let pipeSpeed = 2.5;

function resetGame() {
    birdY = 250;
    velocity = 0;
    score = 0;
    gameOver = false;
    frameCount = 0;
    pipes = [];
    createPipe();
}

function createPipe() {
    let minH = 80;
    let maxH = canvas.height - pipeGap - 80;
    let height = Math.floor(Math.random() * (maxH - minH + 1)) + minH;
    pipes.push({ x: canvas.width, top: height, passed: false });
}

// Kontroller ve Hileler
document.addEventListener("keydown", function(e) {
    if (e.code === "Space") {
        if (gameOver) resetGame();
        else velocity = jump;
    }
    
    // DEVELOPER HİLE TUŞLARI
    if (isDevMode) {
        if (e.key === "h" || e.key === "H") { // H: Ölümsüzlük
            godMode = !godMode;
            alert("Ölümsüzlük: " + (godMode ? "AKTİF" : "PASİF"));
        }
        if (e.key === "k" || e.key === "K") { // K: Skoru hedefe yaklaştır
            score = targetScore - 1;
        }
    }
});

canvas.addEventListener("click", () => {
    if (gameOver) resetGame();
    else velocity = jump;
});

function update() {
    frameCount++;
    
    // Arka plan binalarını yavaşça kaydır (Parallaks efekti)
    backBuildings.forEach(b => {
        b.x -= 0.5;
        if(b.x + b.width < 0) b.x = canvas.width;
    });

    if (!gameOver) {
        velocity += gravity;
        birdY += velocity;

        if ((birdY + 15 >= canvas.height || birdY - 15 <= 0) && !godMode) {
            gameOver = true;
        }

        if (frameCount % 100 === 0) createPipe();

        for (let i = pipes.length - 1; i >= 0; i--) {
            pipes[i].x -= pipeSpeed;

            // Gerçekçi Çarpışma Testi
            if (!godMode && (30 + 15 > pipes[i].x && 30 - 15 < pipes[i].x + pipeWidth)) {
                if (birdY - 12 < pipes[i].top || birdY + 12 > pipes[i].top + pipeGap) {
                    gameOver = true;
                }
            }

            if (!pipes[i].passed && pipes[i].x + pipeWidth < 30) {
                score++;
                pipes[i].passed = true;
                
                // HEDEF SKOR KONTROLÜ
                if(score >= targetScore) {
                    gameOver = true;
                }
            }

            if (pipes[i].x + pipeWidth < 0) pipes.splice(i, 1);
        }
    }
}

function draw() {
    // Gece Gökyüzü ve Gradyan
    let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bgGrad.addColorStop(0, "#0b0c10");
    bgGrad.addColorStop(1, "#1f2833");
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Arka Plan Silüet Binalar
    ctx.fillStyle = "#151922";
    backBuildings.forEach(b => {
        ctx.fillRect(b.x, canvas.height - b.height, b.width, b.height);
    });

    // Engeller (Modern Sokak Binaları - Neon Işıklı)
    pipes.forEach(p => {
        ctx.fillStyle = "#24252a";
        // Üst Bina
        ctx.fillRect(p.x, 0, pipeWidth, p.top);
        ctx.strokeStyle = "#00ffcc"; // Neon kenarlık ışığı
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x, -5, pipeWidth, p.top + 5);

        // Alt Bina
        ctx.fillRect(p.x, p.top + pipeGap, pipeWidth, canvas.height - (p.top + pipeGap));
        ctx.strokeRect(p.x, p.top + pipeGap, pipeWidth, canvas.height - (p.top + pipeGap) + 5);
    });

    // Kuşumuz (Sokak Kuşu - Gölgelendirmeli)
    ctx.save();
    ctx.translate(30, birdY);
    ctx.beginPath();
    ctx.arc(0, 0, 14, 0, Math.PI * 2);
    ctx.fillStyle = godMode ? "#00ff00" : "#ff9f43"; // Hile açıksa yeşil olur
    ctx.fill();
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // Göz ve Gaga
    ctx.beginPath(); ctx.arc(5, -4, 3, 0, Math.PI*2); ctx.fillStyle = "#fff"; ctx.fill(); ctx.closePath();
    ctx.fillStyle = "#ff5252"; ctx.beginPath(); ctx.moveTo(12, 0); ctx.lineTo(19, -3); ctx.lineTo(14, 5); ctx.fill();
    ctx.restore();

    // Skor ve Arayüz
    ctx.fillStyle = "#fff";
    ctx.font = "bold 24px Arial";
    ctx.fillText(`Skor: ${score} / Hedef: ${targetScore}`, 20, 40);

    if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.textAlign = "center";
        
        if (score >= targetScore) {
            ctx.fillStyle = "#00ffcc";
            ctx.font = "bold 34px Arial";
            ctx.fillText("HEDEF GEÇİLDİ!", canvas.width / 2, canvas.height / 2 - 10);
            ctx.font = "18px Arial";
            ctx.fillStyle = "#fff";
            ctx.fillText("Tebrikler, görevi başarıyla tamamladın.", canvas.width / 2, canvas.height / 2 + 30);
        } else {
            ctx.fillStyle = "#ff4a4a";
            ctx.font = "bold 34px Arial";
            ctx.fillText("OYUN BİTTİ", canvas.width / 2, canvas.height / 2 - 10);
            ctx.font = "18px Arial";
            ctx.fillStyle = "#fff";
            ctx.fillText("Tekrar denemek için Tıkla / Space'e bas", canvas.width / 2, canvas.height / 2 + 30);
        }
        ctx.textAlign = "start";
    }
}

function loop() {
    update();
    draw();
    if (currentUser) requestAnimationFrame(loop);
}
</script>
</body>
</html>
