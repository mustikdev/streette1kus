<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sokaklarda 1 Kuş - Büyük Sezon Etkinliği</title>
    <style>
        body {
            background: radial-gradient(circle, #11151c 0%, #07090e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* --- AFİŞ ANA KUTUSU --- */
        .poster {
            width: 450px;
            height: 650px;
            background: linear-gradient(135deg, #141519 0%, #0b0c10 100%);
            border: 3px solid #ff1a1a;
            border-radius: 20px;
            box-shadow: 0 0 35px rgba(255, 26, 26, 0.4), inset 0 0 20px rgba(0, 0, 0, 0.8);
            padding: 35px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            text-align: center;
            box-sizing: border-box;
        }

        /* Arka plan grid çizgileri (image_bcd460.jpg'deki gibi) */
        .poster::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 25px 25px;
            border-radius: 17px;
            pointer-events: none;
        }

        /* --- LOGO VE BAŞLIK ALANI --- */
        .logo-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }
        .logo-img {
            width: 100%;
            max-width: 260px; /* Okunabilirlik için büyütüldü */
            filter: drop-shadow(0 0 12px rgba(255, 26, 26, 0.6));
            margin-bottom: 15px;
        }
        .event-title {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }
        .event-subtitle {
            font-size: 13px;
            color: #ff1a1a;
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 5px;
            margin-bottom: 5px;
            text-shadow: 0 0 8px rgba(255, 26, 26, 0.6);
        }

        /* --- ÖDÜL KARTLARI ALANI --- */
        .rewards-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 2;
        }

        .reward-card {
            width: 100%;
            height: 85px; /* Kart boyutu sabitlendi */
            padding: 0 25px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.01);
        }

        /* Neon Çerçeveler */
        .first-place {
            border: 2px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.25);
        }
        .second-place {
            border: 2px solid #c0c0c0;
            box-shadow: 0 0 15px rgba(192, 192, 192, 0.25);
        }
        .third-place {
            border: 2px solid #ff9f43;
            box-shadow: 0 0 15px rgba(255, 159, 67, 0.25);
        }

        .rank-badge {
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
        }
        
        /* Madalya İkon Tasarımları */
        .medal {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            color: #000;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        .first-place .medal { background: #ffd700; box-shadow: 0 0 12px #ffd700; }
        .second-place .medal { background: #c0c0c0; box-shadow: 0 0 12px #c0c0c0; }
        .third-place .medal { background: #ff9f43; box-shadow: 0 0 12px #ff9f43; }

        .rank-info {
            display: flex;
            flex-direction: column;
        }
        .rank-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            font-weight: 600;
        }
        .rank-name {
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .first-place .rank-name { color: #ffd700; }
        .second-place .rank-name { color: #c0c0c0; }
        .third-place .rank-name { color: #ff9f43; }

        /* Kusursuz Sağ Blok Hizalaması */
        .reward-value {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end; /* Sağ kenara kusursuz hizalama */
            text-align: right;
            height: 100%;
        }
        .reward-price {
            font-size: 16px;
            font-weight: 800;
            color: #fff;
        }
        .or-text {
            font-size: 10px;
            color: #666;
            font-weight: 700;
            margin: 1px 0;
            letter-spacing: 1px;
            width: 100%;
        }
        .reward-subprice {
            font-size: 13px;
            font-weight: 700;
        }
        .first-place .reward-subprice { color: #ffd700; }
        .second-place .reward-subprice { color: #c0c0c0; }
        
        /* Tek satır ödül tam ortalama */
        .third-place .reward-price {
            font-size: 20px;
            color: #ff9f43;
            text-shadow: 0 0 10px rgba(255, 159, 67, 0.3);
        }

        /* --- ALT BİLGİ ALANI --- */
        .footer-area {
            width: 100%;
            z-index: 2;
        }
        .condition-tag {
            background: rgba(255, 26, 26, 0.07);
            border: 1px solid #ff1a1a;
            color: #ff1a1a;
            padding: 8px 24px; /* Padding düzeltildi, yazı ortalandı */
            border-radius: 50px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 15px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 26, 26, 0.2);
        }
        .action-call {
            font-size: 12px;
            color: #aaa;
            line-height: 1.6;
            font-weight: 500;
        }
        .action-call strong {
            color: #fff;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="poster">
        
        <!-- Üst Bölüm -->
        <div class="logo-area">
            <img class="logo-img" src="https://raw.githubusercontent.com/mustikdev/streette1kus/main/image_bb7b42.png" alt="Street Roleplay Logo">
            <div class="event-title">BÜYÜK SEZON</div>
            <div class="event-subtitle">SKOR ETKİNLİĞİ</div>
        </div>

        <!-- Ödüller Bölümü -->
        <div class="rewards-container">
            
            <!-- 1. OYUNCU -->
            <div class="reward-card first-place">
                <div class="rank-badge">
                    <div class="medal">1</div>
                    <div class="rank-info">
                        <span class="rank-title">SEZON BİRİNCİSİ</span>
                        <span class="rank-name">1. OYUNCU</span>
                    </div>
                </div>
                <div class="reward-value">
                    <span class="reward-price">100.000 TL</span>
                    <span class="or-text">VEYA</span>
                    <span class="reward-subprice">100 GR ALTIN</span>
                </div>
            </div>

            <!-- 2. OYUNCU -->
            <div class="reward-card second-place">
                <div class="rank-badge">
                    <div class="medal">2</div>
                    <div class="rank-info">
                        <span class="rank-title">SEZON İKİNCİSİ</span>
                        <span class="rank-name">2. OYUNCU</span>
                    </div>
                </div>
                <div class="reward-value">
                    <span class="reward-price">75.000 TL</span>
                    <span class="or-text">VEYA</span>
                    <span class="reward-subprice">50 GR ALTIN</span>
                </div>
            </div>

            <!-- 3. OYUNCU -->
            <div class="reward-card third-place">
                <div class="rank-badge">
                    <div class="medal">3</div>
                    <div class="rank-info">
                        <span class="rank-title">SEZON ÜÇÜNCÜSÜ</span>
                        <span class="rank-name">3. OYUNCU</span>
                    </div>
                </div>
                <div class="reward-value">
                    <span class="reward-price">50.000 TL!</span>
                </div>
            </div>

        </div>

        <!-- Alt Bölüm -->
        <div class="footer-area">
            <div class="condition-tag">İLK 100 SKOR GEÇERLİDİR</div>
            <div class="action-call">
                Hemen oyuna gir, kuşunu uçur ve<br>
                <strong>Sokakların Kralı</strong> unvanını kap!
            </div>
        </div>

    </div>

</body>
</html>
