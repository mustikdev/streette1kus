<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sokaklarda 1 Kuş</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b0c10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #fff;
        }
        #gameWrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        .panel {
            background: rgba(20, 20, 25, 0.96);
            border: 2px solid #ff1a1a;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0px 0px 20px rgba(255, 26, 26, 0.4);
            text-align: center;
            z-index: 100;
            position: absolute;
        }
        .logo-container {
            width: 100%;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .logo-img {
            width: 100%;
            max-height: 60px;
            object-fit: contain;
        }
        .panel h2 { 
            margin-top: 0; 
            margin-bottom: 15px;
            color: #fff; 
            font-size: 20px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        .panel input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #333;
            background: #151518;
            color: #fff;
            font-size: 14px;
        }
        .panel input:focus { border-color: #ff1a1a; outline: none; }
        .panel button {
            width: 100%;
            padding: 12px;
            background: #ff1a1a;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .panel button:hover { background: #cc0000; box-shadow: 0 0 10px rgba(255, 26, 26, 0.5); }
        .error-msg { color: #ff4a4a; font-size: 13px; margin: 5px 0; display: none; font-weight: 500; }
        .hidden { display: none !important; }
        
        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0px 0px 30px rgba(0,0,0,0.8);
        }
        #devNotice {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 0, 0, 0.8);
            color: #fff;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            z-index: 1000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="gameWrapper">
    <div id="devNotice" class="hidden">DEV MODE: [H] Ölümsüzlük | [K] +10 Skor</div>

    <!-- GİRİŞ PANELİ -->
    <div id="loginPanel" class="panel">
        <div class="logo-container">
            <img class="logo-img" src="https://raw.githubusercontent.com/mustikdev/streette1kus/main/image_bb7b42.png" alt="Street Roleplay Logo">
        </div>
        <h2>Oyuncu Girişi</h2>
        <div class="error-msg" id="loginError"></div>
        
        <input type="text" id="username" placeholder="İsim ve Soyisim (IC)">
        <input type="email" id="email" placeholder="E-Posta Adresi">
        
        <button id="loginBtn" onclick="window.handleLogin()">Oyuna Başla</button>
    </div>

    <!-- OYUN CANVAS -->
    <canvas id="gameCanvas" class="hidden"></canvas>
</div>

<script>
(function() {
    // Tanımladığın Discord Webhook Linki
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1509503712148848752/suQqOT7wZy7KDCwC1vXmT-8ByoTaXSPpQWSe6NcVUETNbuJhyKG2nnOmkcGyrwO20JH0"; 

    let currentUser = null;
    let isDevMode = false;
    let godMode = false;
    
    // Milisaniye bazlı tetikleme engeli için her dönüm noktası takibi
    let milestonesReached = { 10: false, 50: false, 100: false };

    // Arka plan temaları (Her 10 skorda bir değişir)
    const backgroundThemes = [
        { top: "#1a80b8", bottom: "#87ceeb", building: "#104e73" }, // 0-9 Skor: Gündüz
        { top: "#e65c00", bottom: "#f9d423", building: "#5a2000" }, // 10-19 Skor: Gün Batımı
        { top: "#0f2027", bottom: "#203a43", building: "#071014" }, // 20-29 Skor: Gece
        { top: "#2c3e50", bottom: "#3498db", building: "#1a252f" }, // 30-39 Skor: Fırtına Mavisi
        { top: "#61045f", bottom: "#aa076b", building: "#300030" }  // 40+ Skor: Siber Gece
    ];

    const deviceId = btoa(navigator.userAgent + screen.width + screen.height).substring(0, 12);

    window.handleLogin = function() {
        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim().toLowerCase();
        const errorDiv = document.getElementById("loginError");
        
        if (!username || !email) {
            errorDiv.innerText = "Lütfen alanları boş bırakmayın!";
            errorDiv.style.display = "block";
            return;
        }

        currentUser = { username: username, email: email, device: deviceId };

        //if (username.toLowerCase() === "developer") {
          //  isDevMode = true;
            //document.getElementById("devNotice").classList.remove("hidden");
        //}

        sendDiscordLog("🎮 OYUNA GİRİŞ YAPILDI", `👤 **Oyuncu:** ${username}\n📧 **E-Posta:** ${email}\n💻 **Cihaz:** \`${deviceId}\``, 3447003);

        document.getElementById("loginPanel").classList.add("hidden");
        canvas.classList.remove("hidden");
        
        resizeCanvas();
        resetGame();
        loop();
    };

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let birdY, velocity, score, gameOver, pipes, frameCount, wingState;
    
    const gravity = 0.16;
    const jump = -4.3;
    const pipeSpeed = 1.6;
    const pipeGap = 165; 
    const pipeWidth = 75;

    let backBuildings = [];

    function resizeCanvas() {
        let width = window.innerWidth;
        let height = window.innerHeight;
        if (width > 450) width = 450;
        if (height > 700) height = 700;
        canvas.width = width;
        canvas.height = height;

        backBuildings = [];
        for(let i = 0; i < 6; i++) {
            backBuildings.push({ x: i * 90, width: 70, height: 120 + Math.random() * (canvas.height / 3) });
        }
    }
    window.addEventListener("resize", () => { if(currentUser && !gameOver) resizeCanvas(); });

    function resetGame() {
        birdY = canvas.height / 2;
        velocity = 0;
        score = 0;
        gameOver = false;
        frameCount = 0;
        wingState = 0;
        pipes = [];
        milestonesReached = { 10: false, 50: false, 100: false };
        createPipe();
    }

    function createPipe() {
        let minH = 60;
        let maxH = canvas.height - pipeGap - 80;
        let height = Math.floor(Math.random() * (maxH - minH + 1)) + minH;
        pipes.push({ x: canvas.width, top: height, passed: false });
    }

    // DISCORD GELİŞMİŞ LOG SİSTEMİ
    function sendDiscordLog(title, message, colorCode) {
        if (!WEBHOOK_URL) return;
        
        const payload = {
            embeds: [{
                title: title,
                description: message,
                color: colorCode,
                timestamp: new Date()
            }]
        };

        fetch(WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).catch(() => {});
    }

    document.addEventListener("keydown", (e) => {
        if (currentUser && !canvas.classList.contains("hidden")) {
            if (e.code === "Space") {
                e.preventDefault();
                if (gameOver) resetGame();
                else { velocity = jump; wingState = 1; }
            }
            
            if (isDevMode) {
                if (e.key === "h" || e.key === "H") {
                    godMode = !godMode;
                    document.getElementById("devNotice").innerText = "DEV MODE: " + (godMode ? "ÖLÜMSÜZ" : "NORMAL");
                }
                if (e.key === "k" || e.key === "K") {
                    score += 10;
                }
            }
        }
    });

    canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        if (gameOver) resetGame();
        else { velocity = jump; wingState = 1; }
    }, {passive: false});

    canvas.addEventListener("click", () => {
        if (currentUser && !canvas.classList.contains("hidden")) {
            if (gameOver) resetGame();
            else { velocity = jump; wingState = 1; }
        }
    });

    function update() {
        frameCount++;
        if (frameCount % 10 === 0 && wingState > 0) wingState = 0;

        backBuildings.forEach(b => {
            b.x -= 0.25;
            if(b.x + b.width < 0) b.x = canvas.width;
        });

        if (!gameOver) {
            velocity += gravity;
            birdY += velocity;

            if (!godMode && (birdY + 12 >= canvas.height || birdY - 12 <= 0)) {
                gameOver = true;
                handleGameOverLog();
            }

            if (frameCount % 140 === 0) createPipe();

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;

                let birdX = 60; 
                if (!godMode && (birdX + 12 > pipes[i].x && birdX - 12 < pipes[i].x + pipeWidth)) {
                    if (birdY - 10 < pipes[i].top || birdY + 10 > pipes[i].top + pipeGap) {
                        gameOver = true;
                        handleGameOverLog();
                    }
                }

                if (!pipes[i].passed && pipes[i].x + pipeWidth < birdX) {
                    score++;
                    pipes[i].passed = true;
                    checkMilestones();
                }

                if (pipes[i].x + pipeWidth < 0) pipes.splice(i, 1);
            }
        }
    }

    // Çarpan Noktalarında Özel Tebrik Mesajı Gönderme
    function checkMilestones() {
        if (godMode) return;
        
        let targetMilestones = [10, 50, 100];
        targetMilestones.forEach(m => {
            if (score === m && !milestonesReached[m]) {
                milestonesReached[m] = true;
                sendDiscordLog(
                    `🔥 ÖZEL BAŞARI: ${m} SKOR BARAJI AŞILDI!`, 
                    `🏆 **Tebrikler!**\n👤 **Oyuncu:** ${currentUser.username}\n📧 **E-Posta:** ${currentUser.email}\n🎯 **Ulaşılan Özel Skor:** **${score}**\n💻 **Cihaz Kodu:** \`${currentUser.device}\``, 
                    65280 // Canlı Yeşil Renk
                );
            }
        });

        // 100'den sonraki her 50 ve 100 katlarında da özel mesaj atsın
        if (score > 100 && (score % 50 === 0 || score % 100 === 0)) {
            sendDiscordLog(
                `🚀 EFSANEVİ SKOR DÖNÜM NOKTASI: ${score}!`, 
                `👑 Sokaklar Yeni Bir Kral Görüyor!\n👤 **Oyuncu:** ${currentUser.username}\n🎯 **Mevcut Rekor:** **${score}**`, 
                16711900 // Parlak Pembe/Mor
            );
        }
    }

    // Normal Yanma Bildirimi (Her yandığında ne kadar skor yaptığını atar)
    function handleGameOverLog() {
        if (godMode) return;
        sendDiscordLog(
            `💀 OYUN BİTTİ (Skor Bildirimi)`, 
            `👤 **Oyuncu:** ${currentUser.username}\n📧 **E-Posta:** ${currentUser.email}\n📊 **Yaptığı Skor:** **${score}**\n💻 **Cihaz:** \`${currentUser.device}\``, 
            16711680 // Kırmızı Renk
        );
    }

    const logoElement = new Image();
    logoElement.src = "https://raw.githubusercontent.com/mustikdev/streette1kus/main/image_bb7b42.png";

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Her 10 skorda bir temayı hesapla
        let themeIndex = Math.min(Math.floor(score / 10), backgroundThemes.length - 1);
        let currentTheme = backgroundThemes[themeIndex];

        // Gökyüzü Gradiyenti
        let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        bgGrad.addColorStop(0, currentTheme.top);
        bgGrad.addColorStop(1, currentTheme.bottom);
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Arka Plan Şehir Silüeti
        ctx.fillStyle = currentTheme.building;
        backBuildings.forEach(b => {
            ctx.fillRect(b.x, canvas.height - b.height, b.width, b.height);
        });

        // GERÇEKÇİ BORU ÇİZİMİ (Metalik Efektli)
        pipes.forEach(p => {
            // Üst ve Alt ana boru gövde gradiyenti
            let pipeGrad = ctx.createLinearGradient(p.x, 0, p.x + pipeWidth, 0);
            pipeGrad.addColorStop(0, "#1e3c0d");
            pipeGrad.addColorStop(0.3, "#55a630");
            pipeGrad.addColorStop(0.7, "#2b9348");
            pipeGrad.addColorStop(1, "#0a1f07");
            ctx.fillStyle = pipeGrad;
            
            // Üst Boru Gövdesi
            ctx.fillRect(p.x + 4, 0, pipeWidth - 8, p.top);
            // Alt Boru Gövdesi
            ctx.fillRect(p.x + 4, p.top + pipeGap, pipeWidth - 8, canvas.height - (p.top + pipeGap));

            // Boru Başlıkları (Daha geniş, belirgin kapaklar)
            let capGrad = ctx.createLinearGradient(p.x - 4, 0, p.x + pipeWidth + 4, 0);
            capGrad.addColorStop(0, "#224411");
            capGrad.addColorStop(0.4, "#77cc44");
            capGrad.addColorStop(1, "#112200");
            ctx.fillStyle = capGrad;
            
            // Üst kapak ve alt kapak kutuları
            ctx.fillRect(p.x, p.top - 24, pipeWidth, 24);
            ctx.fillRect(p.x, p.top + pipeGap, pipeWidth, 24);

            // Boru gölge çizgileri (Gerçekçilik için yatay çizgiler)
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.fillRect(p.x, p.top - 4, pipeWidth, 4);
            ctx.fillRect(p.x, p.top + pipeGap + 20, pipeWidth, 4);
        });

        // GERÇEKÇİ KUŞ ÇİZİMİ
        ctx.save();
        ctx.translate(60, birdY);
        
        // Kuyruk Tüyleri
        ctx.fillStyle = "#4b6584";
        ctx.beginPath();
        ctx.moveTo(-12, 0);
        ctx.lineTo(-20, -6);
        ctx.lineTo(-18, 6);
        ctx.fill();

        // Kuş Gövdesi (Oval tombul gerçekçi gövde)
        ctx.beginPath();
        ctx.arc(0, 0, 13, 0, Math.PI * 2);
        let birdGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, 13);
        birdGrad.addColorStop(0, "#f5cd79"); // Tatlı sarı/turuncu tonlarında kuş
        birdGrad.addColorStop(0.8, "#f19066");
        birdGrad.addColorStop(1, "#e66767");
        ctx.fillStyle = godMode ? "#00ff00" : birdGrad;
        ctx.fill();
        ctx.strokeStyle = "#cf6a17";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Gerçekçi Kanat (wingState durumuna göre yukarı veya aşağı açılı)
        ctx.fillStyle = "#f7d794";
        ctx.beginPath();
        if (wingState === 1) {
            ctx.ellipse(-2, -4, 8, 5, -Math.PI / 4, 0, Math.PI * 2); // Havalanırken yukarı
        } else {
            ctx.ellipse(-2, 2, 8, 5, Math.PI / 4, 0, Math.PI * 2);   // Süzülürken aşağı
        }
        ctx.fill();
        ctx.stroke();

        // Büyük Canlı Göz
        ctx.beginPath();
        ctx.arc(5, -4, 4, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(6, -4, 2, 0, Math.PI * 2);
        ctx.fillStyle = "#000";
        ctx.fill();

        // Belirgin Turuncu Gaga
        ctx.fillStyle = "#e67e22";
        ctx.beginPath();
        ctx.moveTo(11, -2);
        ctx.lineTo(19, -1);
        ctx.lineTo(12, 4);
        ctx.closePath();
        ctx.fill();

        ctx.restore();

        // Skor Arayüzü
        ctx.fillStyle = "#fff";
        ctx.font = "bold 16px Arial";
        ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
        ctx.shadowBlur = 4;
        ctx.fillText(`SKOR: ${score}`, 15, 30);
        ctx.font = "12px Arial";
        ctx.fillText(`BÖLGE: ${themeIndex + 1}`, 15, 50);
        ctx.shadowBlur = 0; // Gölgeyi sıfırla

        if (gameOver) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            try {
                let logoW = 240;
                let logoH = (logoW * logoElement.height) / logoElement.width;
                ctx.drawImage(logoElement, canvas.width / 2 - logoW / 2, canvas.height / 4, logoW, logoH);
            } catch(e){}

            ctx.textAlign = "center";
            ctx.fillStyle = "#ff1a1a";
            ctx.font = "bold 28px Arial";
            ctx.fillText("OYUN BİTTİ", canvas.width / 2, canvas.height / 2 + 65);
            ctx.font = "16px Arial";
            ctx.fillStyle = "#fff";
            ctx.fillText(`Toplam Skorun: ${score}`, canvas.width / 2, canvas.height / 2 + 95);
            ctx.font = "12px Arial";
            ctx.fillStyle = "#aaa";
            ctx.fillText("Yeniden başlamak için ekrana tıklayın.", canvas.width / 2, canvas.height / 2 + 130);
            ctx.textAlign = "start";
        }
    }

    function loop() {
        update();
        draw();
        if (currentUser) requestAnimationFrame(loop);
    }

    document.addEventListener("keydown", function(e) {
        if (e.key === "F12" || e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J"))) {
            e.preventDefault();
            return false;
        }
    });
})();
</script>
</body>
</html>
